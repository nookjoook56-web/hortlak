name: Vavoo Playlist Olusturucu

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v3

      - name: Python Hazirla
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kutuphaneleri Kur
        run: pip install cloudscraper urllib3

      - name: Python Kodunu Calistir
        env:
          MY_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python << END
          import cloudscraper, json, base64, os, urllib3
          
          # Scraper ve Ayarlar
          scraper = cloudscraper.create_scraper()
          h = urllib3.PoolManager()
          TOKEN = os.getenv('MY_TOKEN')
          USER = "nookjoook56-web"
          REPO = "Repo"
          FILE = "playlist.m3u"

          try:
              # 1. İmza (Sig) Alımı
              auth_res = scraper.post("https://vavoo.to/api/box/ping2", data={"veo": "1"}).json()
              signature = auth_res.get('signed')

              # 2. Kanalları Çek
              channels_res = scraper.get("https://vavoo.to/channels").json()

              # 3. M3U İçeriği Oluştur (Sıfırdan)
              m3u = ["#EXTM3U"]
              for kanal in channels_res:
                  ad = kanal.get("name")
                  id_no = kanal.get("id")
                  ulke = kanal.get("country", "Genel")
                  link = f"https://vavoo.to/play/{id_no}/index.m3u8?n=1&sig={signature}"
                  m3u.append(f'#EXTINF:-1 group-title="{ulke}", {ad}\n{link}')
              
              final_text = "\n".join(m3u)

              # 4. GitHub'a playlist.m3u Olarak Yaz
              api_url = f"https://api.github.com/repos/{USER}/{REPO}/contents/{FILE}"
              headers = {"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}
              
              # Eski dosyanın SHA bilgisini al (zorunlu)
              r_get = h.request('GET', api_url, headers=headers)
              sha = json.loads(r_get.data.decode('utf-8')).get("sha") if r_get.status == 200 else None
              
              payload = {
                  "message": "Playlist Yenilendi (Sig eklendi)",
                  "content": base64.b64encode(final_text.encode("utf-8")).decode("utf-8")
              }
              if sha: payload["sha"] = sha
              
              # Dosyayı yükle
              res = h.request('PUT', api_url, headers=headers, body=json.dumps(payload).encode("utf-8"))
              print(f"Islem Durumu: {res.status}")
          except Exception as e:
              print(f"Hata: {e}")
          END
          
