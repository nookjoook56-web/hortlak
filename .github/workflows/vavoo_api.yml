name: Vavoo Force Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install cloudscraper urllib3

      - name: Run Clean Sync
        env:
          MY_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python << END
          import cloudscraper, urllib3, base64, json, os
          
          TOKEN = os.getenv('MY_TOKEN')
          USER = "nookjoook56-web"
          REPO = "hortlak"  # DEPO ADINI BURADA GÜNCELLEDİK
          FILE = "playlist.m3u"

          s = cloudscraper.create_scraper()
          h = urllib3.PoolManager()
          headers = {"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}

          try:
              # 1. Vavoo API'den imzalı anahtar ve kanalları çek
              auth = s.post("https://vavoo.to/api/box/ping2", data={"veo": "1"}).json()
              sig = auth.get('signed', '')
              channels = s.get("https://vavoo.to/channels", timeout=30).json()
              
              # 2. M3U İçeriğini Oluştur (Sıfırdan temiz liste)
              out = ["#EXTM3U"]
              for ch in channels:
                  name, cid, grp = ch.get("name"), ch.get("id"), ch.get("country", "Genel")
                  url = f"https://vavoo.to/play/{cid}/index.m3u8?n=1&sig={sig}"
                  out.append(f'#EXTINF:-1 group-title="{grp}",{name}\n{url}')
              
              final_content = "\n".join(out)
              
              # 3. GitHub API ile Dosyayı Zorla Oluştur/Güncelle
              api_url = f"https://api.github.com/repos/{USER}/{REPO}/contents/{FILE}"
              r_get = h.request('GET', api_url, headers=headers)
              sha = json.loads(r_get.data.decode('utf-8')).get("sha") if r_get.status == 200 else None
              
              payload = {
                  "message": "Playlist created with sig",
                  "content": base64.b64encode(final_content.encode("utf-8")).decode("utf-8")
              }
              if sha: payload["sha"] = sha
              
              r_put = h.request('PUT', api_url, headers=headers, body=json.dumps(payload).encode("utf-8"))
              print(f"Status: {r_put.status}") 
          except Exception as e:
              print(f"Hata: {e}")
          END
          
