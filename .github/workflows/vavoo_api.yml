name: Vavoo API Güncelleyici

on:
  workflow_dispatch: # Manuel başlatma butonu sağlar
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da otomatik çalışır

permissions:
  contents: write # Dosyayı kaydedebilmesi için yazma izni

jobs:
  update_playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Paketleri Yükle
        run: pip install requests

      - name: Playlist'i Oluştur
        run: |
          cat << 'EOF' > script.py
          import requests
          import json
          
          def main():
              api_url = "https://www2.vavoo.to/live2/index"
              try:
                  response = requests.get(api_url, timeout=30)
                  data = response.json()
                  with open("playlist.m3u", "w", encoding="utf-8") as f:
                      f.write("#EXTM3U\n")
                      for item in data:
                          name = item.get('name', 'Adsız Kanal')
                          url = item.get('url')
                          group = item.get('group', 'Genel')
                          logo = item.get('logo', '')
                          if url:
                              f.write(f'#EXTINF:-1 tvg-logo="{logo}" group-title="{group}",{name}\n')
                              f.write(f"{url}\n")
                  print("Playlist başarıyla güncellendi.")
              except Exception as e:
                  print(f"Hata: {e}")

          if __name__ == "__main__":
              main()
          EOF
          python script.py

      - name: Değişiklikleri Kaydet ve Push Et
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u
          git commit -m "Vavoo Playlist Güncellendi: $(date +'%Y-%m-%d %H:%M')" || echo "Değişiklik yok"
          git push
          
