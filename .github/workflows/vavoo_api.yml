name: Vavoo Final Fix

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install cloudscraper urllib3

      - name: Run Sync
        env:
          MY_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python << END
          import cloudscraper, urllib3, base64, json, os
          
          TOKEN = os.getenv('MY_TOKEN')
          USER = "nookjoook56-web"
          REPO = "hortlak" # Görüntüdeki yeni depo adın
          FILE = "playlist.m3u"

          s = cloudscraper.create_scraper()
          h = urllib3.PoolManager()
          headers = {"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}

          try:
              # 1. Taze imza (sig) al
              auth = s.post("https://vavoo.to/api/box/ping2", data={"veo": "1"}).json()
              sig = auth.get('signed', '')
              
              # 2. Kanalları çek ve imzala
              channels = s.get("https://vavoo.to/channels", timeout=30).json()
              out = ["#EXTM3U"]
              for ch in channels:
                  url = f"https://vavoo.to/play/{ch.get('id')}/index.m3u8?n=1&sig={sig}"
                  out.append(f'#EXTINF:-1 group-title="{ch.get("country")}",{ch.get("name")}\n{url}')
              
              final = "\n".join(out)
              
              # 3. GitHub'a tertemiz yaz (Döngüye girmeden)
              api_url = f"https://api.github.com/repos/{USER}/{REPO}/contents/{FILE}"
              r_get = h.request('GET', api_url, headers=headers)
              sha = json.loads(r_get.data.decode('utf-8')).get("sha") if r_get.status == 200 else None
              
              payload = {"message": "Final Sync with Sig", "content": base64.b64encode(final.encode("utf-8")).decode("utf-8")}
              if sha: payload["sha"] = sha
              
              r_put = h.request('PUT', api_url, headers=headers, body=json.dumps(payload).encode("utf-8"))
              print(f"Bitti! Durum: {r_put.status}")
          except Exception as e:
              print(f"Hata: {e}")
          END
          
