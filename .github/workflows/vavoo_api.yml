name: Vavoo Final Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install cloudscraper urllib3
      - name: Run Clean Sync
        env:
          MY_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python << END
          import cloudscraper, urllib3, base64, json, os
          s = cloudscraper.create_scraper()
          h = urllib3.PoolManager()
          TOKEN = os.getenv('MY_TOKEN')
          USER = "nookjoook56-web"
          REPO = "hortlak" # DEPO ADINI BURADA GÜNCELLEDİK
          FILE = "playlist.m3u"
          try:
              # 1. Taze imza (sig) al
              auth = s.post("https://vavoo.to/api/box/ping2", data={"veo": "1"}).json()
              sig = auth.get('signed', '')
              # 2. Vavoo API'den temiz liste çek ve sig ekle
              channels = s.get("https://vavoo.to/channels", timeout=30).json()
              out = ["#EXTM3U"]
              for ch in channels:
                  url = f"https://vavoo.to/play/{ch.get('id')}/index.m3u8?n=1&sig={sig}"
                  out.append(f'#EXTINF:-1 group-title="{ch.get("country")}",{ch.get("name")}\n{url}')
              final = "\n".join(out)
              # 3. GitHub API ile tertemiz dosyayı zorla oluştur
              api = f"https://api.github.com/repos/{USER}/{REPO}/contents/{FILE}"
              r_g = h.request('GET', api, headers={"Authorization": f"token {TOKEN}"})
              sha = json.loads(r_g.data.decode('utf-8')).get("sha") if r_g.status == 200 else None
              payload = {"message": "Reset and Sync with Sig", "content": base64.b64encode(final.encode("utf-8")).decode("utf-8")}
              if sha: payload["sha"] = sha
              h.request('PUT', api, headers={"Authorization": f"token {TOKEN}"}, body=json.dumps(payload).encode("utf-8"))
          except Exception as e: print(f"Hata: {e}")
          END
          
